name: Analizar acciones

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: arq-auto-update
  cancel-in-progress: true

jobs:
  analizar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mostrar tipo de ejecucion
        run: |
          echo "Evento: ${{ github.event_name }}"
          echo "Schedule: ${{ github.event.schedule }}"
          echo "Fecha UTC:"
          date -u
          echo "Fecha Colombia:"
          TZ=America/Bogota date

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar librerias
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy openpyxl yfinance

      - name: Ejecutar analizador
        run: python analizador_acciones.py

      - name: Guardar datos actualizados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add datos_acciones.json

          if git diff --cached --quiet; then
            echo "Sin cambios para guardar"
          else
            git commit -m "Actualizar datos ARQ"
            git push
          fi
