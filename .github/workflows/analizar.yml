name: Analizar acciones

on:
  workflow_dispatch:

  schedule:
    # Cada 5 minutos, pero corrido a minutos menos usados por GitHub
    # 3, 8, 13, 18, 23, 28, 33, 38, 43, 48, 53, 58
    - cron: "3-58/5 * * * *"

  push:
    branches:
      - main
    paths:
      - ".github/workflows/analizar.yml"
      - "analizador_acciones.py"

permissions:
  contents: write

concurrency:
  group: arq-auto-update
  cancel-in-progress: true

jobs:
  analizar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mostrar tipo de ejecucion
        run: |
          echo "Evento: ${{ github.event_name }}"
          echo "Schedule: ${{ github.event.schedule }}"
          echo "Rama: ${{ github.ref }}"
          echo "Fecha UTC:"
          date -u
          echo "Fecha Colombia:"
          TZ=America/Bogota date

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar librerias
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy openpyxl yfinance requests

      - name: Ejecutar analizador
        run: python analizador_acciones.py

      - name: Guardar datos actualizados
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add datos_acciones.json

          if git diff --cached --quiet; then
            echo "Sin cambios para guardar"
          else
            git commit -m "Actualizar datos ARQ automatico"
            git push
          fi
