name: Analizar acciones

on:
  workflow_dispatch:

  repository_dispatch:
    types: [activar-arq]

permissions:
  contents: write

concurrency:
  group: analizar-acciones
  cancel-in-progress: true

jobs:
  analizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Mostrar tipo de ejecucion
        run: |
          echo "Evento que activo el workflow: ${{ github.event_name }}"
          echo "Rama actual: ${{ github.ref_name }}"

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Instalar librerias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar mercado abierto NYSE
        id: mercado
        run: |
          python - <<'PY'
          from datetime import datetime, time
          from zoneinfo import ZoneInfo

          ahora_ny = datetime.now(ZoneInfo("America/New_York"))
          apertura = time(9, 30)
          cierre = time(16, 0)

          es_laboral = ahora_ny.weekday() < 5
          mercado_abierto = es_laboral and apertura <= ahora_ny.time() <= cierre

          print(f"Ahora NY: {ahora_ny.strftime('%Y-%m-%d %H:%M:%S %Z')}")
          print(f"Apertura NYSE: {apertura}")
          print(f"Cierre NYSE: {cierre}")
          print(f"Mercado abierto: {mercado_abierto}")

          with open("mercado_estado.txt", "w", encoding="utf-8") as f:
              f.write("true" if mercado_abierto else "false")
          PY

          MERCADO=$(cat mercado_estado.txt)
          echo "abierto=$MERCADO" >> $GITHUB_OUTPUT

      - name: Mercado cerrado - no ejecutar analisis
        if: steps.mercado.outputs.abierto != 'true'
        run: |
          echo "Mercado cerrado. No se ejecuta el analisis."

      - name: Ejecutar analizador
        if: steps.mercado.outputs.abierto == 'true'
        run: |
          python analizador_acciones.py

      - name: Guardar datos actualizados
        if: steps.mercado.outputs.abierto == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git pull --rebase origin main

          git add datos_acciones.json

          if git diff --cached --quiet; then
            echo "No hay cambios para guardar."
          else
            git commit -m "Actualizar datos ARQ automatico"
            git pull --rebase origin main
            git push origin main
          fi
